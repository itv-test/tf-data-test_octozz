name: Create & Configure Repo
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Module name in snake_case, e.g. analytics_hub'
        required: true
        type: string
      description:
        description: 'Module description that will be in the README'
        required: true
        type: string

run-name: "Creating new module: ${{ inputs.name }} | Started by: ${{ github.actor }}"
env:
  PREFIX: tf-data
  MODULE_NAME: tf-data-${{ inputs.name }}
  MODULE_REPO: ${{ github.repository_owner }}/tf-data-${{ inputs.name }}

jobs:
  validate:
    permissions:
      contents: read # for checkout
    runs-on: ubuntu-latest
    steps:
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate input form
        env:
          GHA_MODULE_NAME: ${{ inputs.name }}
          GHA_MODULE_DESCRIPTION: ${{ inputs.description }}
        run: |
          python3 scripts/validator.py

  create-repo:
    needs: validate
    uses: itv-test/test-actions/.github/workflows/create-repo.yml@v1.17.0
    with:
      name: tf-data-${{ inputs.name }}
      description: ${{ inputs.description }}
      business-area: cortex
      template: ${{ github.repository }}
      identity-path: chainguard/configure-repo.sts.yaml

  configure:
    permissions:
      id-token: write # for octo-sts token exchange
    needs: create-repo
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub token via Octo STS
        id: octo-sts
        uses: itv-test/test-actions/octo-sts@main
        with:
          scope: ${{ env.MODULE_REPO }}
          identity: configure-repo

      - name: Checkout new repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.MODULE_REPO }}
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Configure repository files
        run: |
          mv -v module_workflows/* .github/workflows/
          rm -rf scripts module_workflows .github/workflows/create-repo.yml README.md .github/chainguard
          mv README.md.jinja README.md
          sed -i -e "s;{{ module }};${{ inputs.name }};g" README.md
          sed -i -e "s;{{ prefix }};${{ env.PREFIX }};g" README.md
          sed -i -e "s;{{ description }};${{ inputs.description }};g" README.md

      - name: Commit configured files
        uses: itv-test/test-actions/bot-commit@main
        with:
          repository: ${{ env.MODULE_REPO }}
          token: ${{ steps.octo-sts.outputs.token }}
          message: "chore(initial): configure module from template"
          files: |
            **

      - name: Configure topics and custom properties
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh api \
            --method PUT \
            "/repos/${{ env.MODULE_REPO }}/topics" \
            -f "names[]=cortex"
          gh api \
            --method PATCH \
            "/repos/${{ env.MODULE_REPO }}/properties/values" \
            -f "properties[][property_name]=safe-settings-suborg" \
            -f "properties[][value]=central-data-default"

      - name: Summary
        run: |
          echo "### Successfully created a new module :rocket: - https://github.com/${{ env.MODULE_REPO }}" >> $GITHUB_STEP_SUMMARY

  add-to-allow-list:
    permissions:
      id-token: write # for octo-sts token exchange
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      ALLOW_LIST_REPO: ${{ github.repository_owner }}/test-actions
    steps:
      - name: Get GitHub token via Octo STS
        id: octo-sts
        uses: itv-test/test-actions/octo-sts@main
        with:
          identity: module-allowlist

      - name: Checkout itv-data-actions
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ env.ALLOW_LIST_REPO }}
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Prepare allow list update
        env:
          ALLOW_LIST_PATH: composite-actions/gcp-terragrunt-prep/cortex-approved-modules.txt
        run: |
          if grep -qF "${MODULE_REPO}" "${ALLOW_LIST_PATH}"; then
            echo "Module already in allow list, skipping."
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "${MODULE_REPO}" >> "${ALLOW_LIST_PATH}"

      - name: Commit allow list update
        if: env.SKIP != 'true'
        uses: itv-test/test-actions/bot-commit@main
        with:
          repository: ${{ env.ALLOW_LIST_REPO }}
          ref: refs/heads/add-${{ env.MODULE_NAME }}-to-allow-list
          message: "Add module to allow list"
          files: |
            composite-actions/gcp-terragrunt-prep/cortex-approved-modules.txt

      - name: Open pull request
        if: env.SKIP != 'true'
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          gh api --method POST "/repos/${ALLOW_LIST_REPO}/pulls" \
            -f "title=chore: Add ${MODULE_NAME} to allow list" \
            -f "body=This PR adds ${MODULE_NAME} to the allow list." \
            -f "head=add-${MODULE_NAME}-to-allow-list" \
            -f "base=main"
